name: Build APK

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build with Gradle
      uses: gradle-build-action@v2
      with:
        arguments: build assembleDebug assembleRelease --warning-mode none
    
    - name: List APK Files
      run: |
        echo "=== Debug APK Directory ==="
        ls -la app/build/outputs/apk/debug/ || echo "Directory not found"
        find app/build/outputs -name "*.apk" || echo "No APK files found"
        echo "=== Release APK Directory ==="
        ls -la app/build/outputs/apk/release/ || echo "Directory not found"
    
    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-release
        path: app/build/outputs/apk/release/*.apk
