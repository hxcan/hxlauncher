name: Build APK

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Configure Gradle Mirror
      run: |
        mkdir -p ~/.gradle
        echo "distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://mirrors.aliyun.com/gradle/gradle-8.6-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists" > ~/.gradle/gradle.properties
    
    - name: Grant execute permission to gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle (with retry, warnings disabled)
      run: |
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
        ./gradlew build --warning-mode none || ./gradlew build --warning-mode none
    
    - name: Assemble Debug APK
      run: ./gradlew assembleDebug --warning-mode none
    
    - name: Assemble Release APK
      run: ./gradlew assembleRelease --warning-mode none
    
    - name: List APK Files
      run: |
        echo "=== Debug APK Directory ==="
        ls -la app/build/outputs/apk/debug/ || echo "Directory not found"
        find app/build/outputs -name "*.apk" || echo "No APK files found"
        echo "=== Release APK Directory ==="
        ls -la app/build/outputs/apk/release/ || echo "Directory not found"
    
    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-release
        path: app/build/outputs/apk/release/*.apk
