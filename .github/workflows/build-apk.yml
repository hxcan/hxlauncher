name: Build APK
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission to gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: |
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
        ./gradlew assembleDebug assembleRelease --warning-mode none
    
    - name: Create CI Release (master push)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ci/auto-build-${{ github.run_number }}
        name: 🤖 CI Build #${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        prerelease: true
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## 🤖 自动构建版本
          
          **构建编号:** ${{ github.run_number }}
          **提交:** ${{ github.sha }}
          
          ---
          ### 📦 下载
          - **Debug 版**: `hxlauncher-debug-*.apk`
          - **Release 版**: `hxlauncher-release-*.apk`
    
    - name: Upload Debug APK (PR)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Upload Release APK (PR)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: hxlauncher-release
        path: app/build/outputs/apk/release/*.apk
